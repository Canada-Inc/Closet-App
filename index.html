<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLOS3T - Bitmoji Animation Studio</title>
    
    <!-- PWA Mobile Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Bitmoji Studio">

    <!-- Core Graphics Engine Dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        /* STYLIZED ANIMATION STUDIO DESIGN SYSTEM */
        :root {
            --bg-bright: #f4f5f7;
            --bg-panel: #ffffff;
            --accent-cher: #ffe600;
            --clueless-pink: #ffb6c1;
            --text-dark: #111111;
            --border-thick: 3px solid #111111;
            --retro-shadow: 5px 5px 0px #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-bright);
            color: var(--text-dark);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            height: 100vh;
        }

        /* ACCOUNT GATEKEEPER SIGN IN PANEL */
        .auth-gatekeeper {
            position: fixed;
            inset: 0;
            background: var(--accent-cher);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .studio-card {
            background: var(--bg-panel);
            border: var(--border-thick);
            padding: 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--retro-shadow);
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border: var(--border-thick);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: var(--clueless-pink);
            color: var(--text-dark);
            border: var(--border-thick);
            font-size: 1rem;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 3px 3px 0px #111111;
            margin-bottom: 8px;
        }

        .primary-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #111111;
        }

        .workspace-shell {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            overflow-y: scroll;
            padding-bottom: 60px;
            -webkit-overflow-scrolling: touch;
        }

        .studio-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border: var(--border-thick);
            background: var(--accent-cher);
            box-shadow: var(--retro-shadow);
        }

        /* ANIMATED 3D STAGE PANEL */
        .viewport-panel {
            background: #ffffff;
            border: var(--border-thick);
            box-shadow: var(--retro-shadow);
            position: relative;
            height: 380px;
            overflow: hidden;
            touch-action: none; 
        }

        #canvas3dContainer { width: 100%; height: 100%; cursor: grab; }
        #canvas3dContainer:active { cursor: grabbing; }

        .control-panel {
            background: var(--bg-panel);
            border: var(--border-thick);
            padding: 15px;
            box-shadow: var(--retro-shadow);
        }

        .dock-row { display: flex; gap: 8px; margin-top: 12px; }

        .uploader-zone label {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 14px;
            background: #ffffff;
            border: 3px dashed #111111;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .uploader-zone input[type="file"] { display: none; }

        .selector-chip {
            flex: 1;
            padding: 12px 6px;
            background: #ffffff;
            border: var(--border-thick);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 2px 2px 0px #111111;
        }

        .system-ticker-box {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            border: var(--border-thick);
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 900;
            box-shadow: 3px 3px 0px #111111;
            white-space: nowrap;
            z-index: 10;
        }

        /* PHOTO CLOSET GALLERY DISPLAY VAULT */
        .vault-panel {
            background: var(--bg-panel);
            border: var(--border-thick);
            padding: 15px;
            box-shadow: var(--retro-shadow);
            margin-bottom: 20px;
        }

        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .vault-card {
            border: 2px solid #111111;
            background: #f4f5f7;
            padding: 4px;
            text-align: center;
            position: relative;
        }

        .vault-card img {
            width: 100%;
            height: 75px;
            object-fit: cover;
            border: 1px solid #111111;
        }

        .vault-card span {
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            display: block;
            margin-top: 4px;
        }

        .owner-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--accent-cher);
            border: 1px solid #000;
            font-size: 0.5rem;
            font-weight: 900;
            padding: 1px 3px;
        }

        .loader-spinner {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            z-index: 50;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 0.85rem;
        }

        .pulse-ring {
            width: 30px; height: 30px;
            border: 4px solid var(--bg-bright);
            border-top-color: var(--clueless-pink);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- RETRO CLOUD SIGN IN INTERFACE INTERCEPTOR OVERLAY -->
    <div id="authOverlay" class="auth-gatekeeper">
        <div class="studio-card">
            <h2 style="margin-top:0; font-size:1.6rem; font-weight:900; letter-spacing: -1px;">BITMOJI SPATIAL CAB</h2>
            <p style="font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; color: #555;">Live Connected Styling Deck v4.0</p>
            
            <input type="email" id="authEmail" class="input-field" placeholder="Email Address">
            <input type="password" id="authPassword" class="input-field" placeholder="Password">
            
            <button onclick="executeAuthAction('login')" class="primary-btn">Open Wardrobe Workspace</button>
            <button onclick="executeAuthAction('register')" class="primary-btn" style="background:#d8bfd8;">Create New Profile Profile</button>
            <button onclick="bypassToSandbox()" class="primary-btn" style="background:#ffffff; font-size:0.75rem;">Run Offline Design Sandbox</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD SPACE LAYOUT -->
    <div class="workspace-shell">
        <nav class="studio-navbar">
            <span style="font-weight:900; font-size:1.1rem;" id="studioTitle">STUDIO_DECK</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <span id="userGreeting" style="font-weight:900; font-size:0.8rem; text-transform: uppercase; background:#fff; border:2px solid #000; padding:2px 6px;">SYNCING...</span>
                <span onclick="triggerExitSession()" style="cursor:pointer; font-size:0.75rem; color:#ef4444; font-weight:900; border:2px solid #000; padding:2px 5px; background:#fff;">Log out</span>
            </div>
        </nav>

        <!-- 3D VIEWPORT CANVAS HUBS PANEL -->
        <div class="viewport-panel">
            <div id="systemNotification" class="system-ticker-box">DRAG OR SWIPE TO ROTATE CHARACTER</div>
            <div id="canvas3dContainer"></div>
            
            <div id="uiLoader" class="loader-spinner">
                <div class="pulse-ring"></div>
                <span id="loaderMessage">GENERATING CARTOON VECTOR MESH...</span>
            </div>
        </div>

        <!-- PHOTO UPLOAD CAPTURE CONSOLE -->
        <div class="control-panel" id="uploadConsoleControl">
            <div class="uploader-zone">
                <label for="imageInput">✦ PHOTO GARMENT ON HANGER TO ENGINE ✦</label>
                <input type="file" id="imageInput" accept="image/*" onchange="processGarmentIngestion()">
            </div>
            
            <div class="dock-row">
                <select id="itemCategory" class="input-field" style="margin:0; width:45%; height:46px; border:var(--border-thick);">
                    <option value="hat">Headwear</option>
                    <option value="torso">Upper Layer</option>
                    <option value="legs">Bottoms</option>
                </select>
                <button class="selector-chip" onclick="rotateSpatialAsset('hat')">Hat ↻</button>
                <button class="selector-chip" onclick="rotateSpatialAsset('torso')">Top ↻</button>
                <button class="selector-chip" onclick="rotateSpatialAsset('legs')">Legs ↻</button>
            </div>
        </div>

        <!-- PHOTO STORAGE GRID ARCHIVE -->
        <div class="vault-panel">
            <h3 style="margin:0; font-size:0.9rem; font-weight:900;" id="vaultTitle">📸 PERSONAL CLOSET ARCHIVE VAULT</h3>
            <div class="vault-grid" id="vaultGridDisplay"></div>
        </div>
    </div>

    <!-- MAIN APP CORE PROCESSING MECHANICS ENGINE SCRIPTS -->
    <script>
        // ========================================================
        // 1. DATABASE CONNECTIVITY LAYER CONFIGURATIONS
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyACAhIxxUNej5lH73ilr0L2AGhvAbtGQxw",
            authDomain: "closetapp-4e847.firebaseapp.com",
            projectId: "closetapp-4e847",
            storageBucket: "closetapp-4e847.firebasestorage.app",
            messagingSenderId: "305769653826",
            appId: "1:305769653826:web:51858641eee0a71aafefdb"
        };

        const PRIVACY_VIP_LIST = [
            "hunter.folk8@gmail.com", 
            "your-girlfriends-email@example.com",
            "admin@clos3t.com"
        ];

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let activeSessionUser = null;
        let personalClosetMap = { hat: [], torso: [], legs: [] };
        let photoVaultMap = { hat: [], torso: [], legs: [] };
        let assetIndices = { hat: 0, torso: 0, legs: 0 };

        let sceneContext, lensCamera, canvasRenderer, virtualMannequinGroup;
        let activeStageMeshes = { hat: null, torso: null, legs: null };

        let isDraggingInputPointer = false;
        let previousPointerPositionX = 0;

        const softwareTextureLoader = new THREE.TextureLoader();

        auth.onAuthStateChanged(user => {
            if (user) {
                const emailCheck = user.email.trim().toLowerCase();
                if (!PRIVACY_VIP_LIST.includes(emailCheck)) {
                    alert("Unauthorized entry blueprint profile. Terminating process pipeline.");
                    auth.signOut();
                    return;
                }
                
                activeSessionUser = user;
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('userGreeting').innerText = user.email.split('@')[0].toUpperCase();
                
                if(emailCheck === "admin@clos3t.com") {
                    document.getElementById('studioTitle').innerText = "MASTER_ADMIN_CONSOLE";
                    document.getElementById('vaultTitle').innerText = "📸 GLOBAL DISK HOUSING VAULT (ALL POOLS)";
                }

                initSpatial3DEngine();
                synchronizeCloudClosetStorage();
            } else {
                activeSessionUser = null;
                document.getElementById('authOverlay').style.display = 'flex';
                document.getElementById('userGreeting').innerText = "OFFLINE";
            }
        });

        function executeAuthAction(mode) {
            const emailInput = document.getElementById('authEmail').value.trim().toLowerCase();
            const pass = document.getElementById('authPassword').value;
            
            if (!emailInput || !pass) return alert("Fill out security entries nodes strings parameters.");
            if (!PRIVACY_VIP_LIST.includes(emailInput)) return alert("Access Denied: Private dressing room ecosystem.");

            if (mode === 'register') {
                auth.createUserWithEmailAndPassword(emailInput, pass).then(cred => {
                    return db.collection('vault_closets').doc(cred.user.uid).set({
                        email: emailInput,
                        hat: ["#eab308"], torso: ["#ec4899"], legs: ["#3b82f6"],
                        hat_photos: ["https://images.unsplash.com/photo-1534215754734-18e55d13ce35?w=150"],
                        torso_photos: ["https://images.unsplash.com/photo-1576995853123-5a10305d93c0?w=150"],
                        legs_photos: ["https://images.unsplash.com/photo-1542272604-787c3835535d?w=150"]
                    });
                }).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(emailInput, pass).catch(err => alert(err.message));
            }
        }

        function bypassToSandbox() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('userGreeting').innerText = "DESIGN_SANDBOX";
            initSpatial3DEngine();
            personalClosetMap = { hat: ["#ffe600"], torso: ["#ffb6c1"], legs: ["#3b82f6"] };
            photoVaultMap = { 
                hat: ["https://images.unsplash.com/photo-1534215754734-18e55d13ce35?w=150"], 
                torso: ["https://images.unsplash.com/photo-1576995853123-5a10305d93c0?w=150"], 
                legs: ["https://images.unsplash.com/photo-1542272604-787c3835535d?w=150"] 
            };
            renderVaultGridDisplay();
            loadActiveWardrobeModelsToMannequin();
        }

        function triggerExitSession() { auth.signOut().then(() => window.location.reload()); }

        // ========================================================
        // 2. STYLIZED CEL-SHADED TOON ANIMATION THREE.JS GRAPHICS
        // ========================================================
        function initSpatial3DEngine() {
            const viewport = document.getElementById('canvas3dContainer');
            if (sceneContext) return;

            sceneContext = new THREE.Scene();
            sceneContext.background = new THREE.Color(0xf4f5f7); 

            lensCamera = new THREE.PerspectiveCamera(40, viewport.clientWidth / viewport.clientHeight, 0.1, 100);
            lensCamera.position.set(0, 0.8, 2.6);

            canvasRenderer = new THREE.WebGLRenderer({ antialias: true });
            canvasRenderer.setSize(viewport.clientWidth, viewport.clientHeight);
            canvasRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            viewport.appendChild(canvasRenderer.domElement);

            // Studio Ambient Tone mapping definitions
            const ambient = new THREE.AmbientLight(0xffffff, 0.95);
            sceneContext.add(ambient);

            // KEY CEL-SHADING CONFIG: Solid flat lighting matrix nodes to prevent soft real reflections blends
            const flatDirectionalLight = new THREE.DirectionalLight(0xffffff, 0.35);
            flatDirectionalLight.position.set(1, 3, 2);
            sceneContext.add(flatDirectionalLight);

            // SMOOTHED ROUNDED ANIMATED AVATAR BODY STRUCTURE PIPELINES
            virtualMannequinGroup = new THREE.Group();
            
            // Matte pastel gray vector style cartoon skin material
            const bitmojiSkinMaterial = new THREE.MeshToonMaterial({ 
                color: 0xe2e8f0,
                roughness: 0.8
            });

            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.038, 0.08, 32), bitmojiSkinMaterial); 
            neck.position.y = 1.08;
            
            // Curved head sphere node layout frame
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.095, 32, 32), bitmojiSkinMaterial); 
            head.position.y = 1.19;
            
            // Soft rounded torso capsule geometry frame structure chest node
            const torsoChest = new THREE.Mesh(new THREE.CapsuleGeometry(0.095, 0.26, 32, 32), bitmojiSkinMaterial); 
            torsoChest.position.y = 0.82;
            torsoChest.scale.set(1.3, 1.0, 1.0); // Broaden shoulder bounds slightly for cartoon aesthetic layout look

            // Smooth Rounded Vector Arms
            const leftArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.024, 0.28, 16, 16), bitmojiSkinMaterial); 
            leftArm.position.set(-0.16, 0.78, 0); leftArm.rotation.z = 0.12;
            
            const rightArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.024, 0.28, 16, 16), bitmojiSkinMaterial); 
            rightArm.position.set(0.16, 0.78, 0); rightArm.rotation.z = -0.12;
            
            // Smooth Rounded Vector Leg Joints
            const leftLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.032, 0.42, 16, 16), bitmojiSkinMaterial); 
            leftLeg.position.set(-0.05, 0.35, 0);
            
            const rightLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.032, 0.42, 16, 16), bitmojiSkinMaterial); 
            rightLeg.position.set(0.05, 0.35, 0);

            virtualMannequinGroup.add(neck); virtualMannequinGroup.add(head); virtualMannequinGroup.add(torsoChest);
            virtualMannequinGroup.add(leftArm); virtualMannequinGroup.add(rightArm); virtualMannequinGroup.add(leftLeg); virtualMannequinGroup.add(rightLeg);
            sceneContext.add(virtualMannequinGroup);

            function renderTick() { requestAnimationFrame(renderTick); canvasRenderer.render(sceneContext, lensCamera); }
            renderTick();

            // Drag navigation interfaces metrics loops
            viewport.addEventListener('mousedown', (e) => { isDraggingInputPointer = true; previousPointerPositionX = e.clientX; });
            viewport.addEventListener('touchstart', (e) => { isDraggingInputPointer = true; previousPointerPositionX = e.touches[0].clientX; }, {passive: true});
            window.addEventListener('mousemove', (e) => {
                if (!isDraggingInputPointer || !virtualMannequinGroup) return;
                let deltaX = e.clientX - previousPointerPositionX;
                virtualMannequinGroup.rotation.y += deltaX * 0.01; previousPointerPositionX = e.clientX;
            });
            window.addEventListener('touchmove', (e) => {
                if (!isDraggingInputPointer || !virtualMannequinGroup) return;
                let deltaX = e.touches[0].clientX - previousPointerPositionX;
                virtualMannequinGroup.rotation.y += deltaX * 0.01; previousPointerPositionX = e.touches[0].clientX;
            }, {passive: true});
            window.addEventListener('mouseup', () => isDraggingInputPointer = false);
            window.addEventListener('touchend', () => isDraggingInputPointer = false);
        }

        // ========================================================
        // 3. STORAGE SYNC & BITMOJI DESIGN PROCESSING CHANNELS
        // ========================================================
        function processGarmentIngestion() {
            if(auth.currentUser && auth.currentUser.email === "admin@clos3t.com") return alert("Admin panel is read-only management access layer.");
            
            const fileBox = document.getElementById('imageInput');
            const targetCategory = document.getElementById('itemCategory').value;
            const loader = document.getElementById('uiLoader');
            
            if (!fileBox.files[0]) return;
            loader.style.display = 'flex';
            document.getElementById('loaderMessage').innerText = "AI PROCEDURAL BACKGROUND SEGMENTATION MASKING...";

            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                const base64DataUrl = e.target.result;

                setTimeout(() => {
                    document.getElementById('loaderMessage').innerText = "TAILORING VECTOR CEL-SHADED GARMENT LAYER...";
                    
                    setTimeout(() => {
                        if (activeSessionUser) {
                            db.collection('vault_closets').doc(activeSessionUser.uid).update({
                                [targetCategory]: firebase.firestore.FieldValue.arrayUnion(base64DataUrl),
                                [`${targetCategory}_photos`]: firebase.firestore.FieldValue.arrayUnion(base64DataUrl)
                            }).then(() => {
                                loader.style.display = 'none';
                                synchronizeCloudClosetStorage();
                            });
                        } else {
                            loader.style.display = 'none';
                            personalClosetMap[targetCategory].push(base64DataUrl);
                            photoVaultMap[targetCategory].push(base64DataUrl);
                            assetIndices[targetCategory] = personalClosetMap[targetCategory].length - 1;
                            renderVaultGridDisplay();
                            loadActiveWardrobeModelsToMannequin();
                        }
                    }, 1000);
                }, 1000);
            };
            fileReader.readAsDataURL(fileBox.files[0]);
        }

        function synchronizeCloudClosetStorage() {
            if (!activeSessionUser) return;
            
            if(activeSessionUser.email === "admin@clos3t.com") {
                db.collection('vault_closets').get().then(snapshot => {
                    const gridContainer = document.getElementById('vaultGridDisplay');
                    gridContainer.innerHTML = '';
                    
                    snapshot.forEach(doc => {
                        let data = doc.data();
                        let labelName = data.email ? data.email.split('@')[0] : "USER";
                        ['hat_photos', 'torso_photos', 'legs_photos'].forEach(key => {
                            let category = key.split('_')[0];
                            (data[key] || []).forEach(imgData => {
                                createVaultCardElement(gridContainer, imgData, category, labelName);
                            });
                        });
                    });
                });
            } else {
                db.collection('vault_closets').doc(activeSessionUser.uid).get().then(doc => {
                    if (doc.exists()) {
                        const serverData = doc.data();
                        personalClosetMap.hat = serverData.hat || [];
                        personalClosetMap.torso = serverData.torso || [];
                        personalClosetMap.legs = serverData.legs || [];

                        photoVaultMap.hat = serverData.hat_photos || [];
                        photoVaultMap.torso = serverData.torso_photos || [];
                        photoVaultMap.legs = serverData.legs_photos || [];

                        renderVaultGridDisplay();
                        loadActiveWardrobeModelsToMannequin();
                    }
                });
            }
        }

        function rotateSpatialAsset(category) {
            const itemsList = personalClosetMap[category] || [];
            if (itemsList.length === 0) return alert("Wardrobe targeted lane segment container is currently empty.");

            assetIndices[category] = (assetIndices[category] + 1) % itemsList.length;
            loadActiveWardrobeModelsToMannequin();
            document.getElementById('systemNotification').innerText = `ANIMATION STUDIO VIEW: ITEM #${assetIndices[category] + 1}`;
        }

        function loadActiveWardrobeModelsToMannequin() {
            if(personalClosetMap.hat.length > 0) mountSpatialModelToMannequin('hat', personalClosetMap.hat[assetIndices.hat]);
            if(personalClosetMap.torso.length > 0) mountSpatialModelToMannequin('torso', personalClosetMap.torso[assetIndices.torso]);
            if(personalClosetMap.legs.length > 0) mountSpatialModelToMannequin('legs', personalClosetMap.legs[assetIndices.legs]);
        }

        function mountSpatialModelToMannequin(category, textureData) {
            if (!textureData || !virtualMannequinGroup) return;

            if (activeStageMeshes[category]) {
                virtualMannequinGroup.remove(activeStageMeshes[category]);
            }

            if (textureData.startsWith('#')) {
                // Apply a smooth, cell-shaded animated material color layer palette
                const cartoonColorMaterial = new THREE.MeshToonMaterial({ 
                    color: new THREE.Color(textureData), 
                    roughness: 0.9 
                });
                buildCompoundCartoonGarment(category, cartoonColorMaterial);
                return;
            }

            softwareTextureLoader.load(textureData, (textureInstance) => {
                textureInstance.wrapS = THREE.RepeatWrapping; textureInstance.wrapT = THREE.RepeatWrapping;
                textureInstance.repeat.set(1.5, 1.5); 
                
                // Matte cell-shaded material that displays custom clothes texturing natively
                const cartoonTextureMaterial = new THREE.MeshToonMaterial({ 
                    map: textureInstance, 
                    roughness: 0.85 
                });
                buildCompoundCartoonGarment(category, cartoonTextureMaterial);
            });
        }

        // UPGRADED METHOD: Assembles highly-stylized rounded cartoon garment panels with precise bold outline structures
        function buildCompoundCartoonGarment(category, materialInstance) {
            const garmentGroupContainer = new THREE.Group();

            // Setup bold black graphic outline styling configurations variables constant
            const cartoonOutlineMaterial = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.BackSide });

            function applyOutlineStrokeMesh(meshGeometryInstance, outlineThicknessScaleFactor) {
                const outlineMeshNode = new THREE.Mesh(meshGeometryInstance.geometry, cartoonOutlineMaterial);
                outlineMeshNode.position.copy(meshGeometryInstance.position);
                outlineMeshNode.rotation.copy(meshGeometryInstance.rotation);
                outlineMeshNode.scale.copy(meshGeometryInstance.scale).multiplyScalar(outlineThicknessScaleFactor);
                garmentGroupContainer.add(outlineMeshNode);
                garmentGroupContainer.add(meshGeometryInstance);
            }

            if (category === 'hat') {
                // ROUNDED SMOOTH BASEBALL CAP GEOMETRY
                const capDome = new THREE.Mesh(new THREE.SphereGeometry(0.101, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2), materialInstance); 
                capDome.position.y = 1.19;
                
                const capVisorBrim = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.012, 0.11), materialInstance); 
                capVisorBrim.position.set(0, 1.18, 0.085); capVisorBrim.rotation.x = 0.08;

                applyOutlineStrokeMesh(capDome, 1.05);
                applyOutlineStrokeMesh(capVisorBrim, 1.08);

            } else if (category === 'torso') {
                // FITTED SWEATER & CURVED HOODIE SLEEVES GEOMETRY
                const shirtChest = new THREE.Mesh(new THREE.CapsuleGeometry(0.102, 0.25, 32, 32), materialInstance); 
                shirtChest.position.y = 0.82; shirtChest.scale.set(1.34, 1.02, 1.04);

                const leftSleeve = new THREE.Mesh(new THREE.CapsuleGeometry(0.029, 0.13, 16, 16), materialInstance); 
                leftSleeve.position.set(-0.145, 0.86, 0); leftSleeve.rotation.z = 0.24;

                const rightSleeve = new THREE.Mesh(new THREE.CapsuleGeometry(0.029, 0.13, 16, 16), materialInstance); 
                rightSleeve.position.set(0.145, 0.86, 0); rightSleeve.rotation.z = -0.24;

                applyOutlineStrokeMesh(shirtChest, 1.04);
                applyOutlineStrokeMesh(leftSleeve, 1.08);
                applyOutlineStrokeMesh(rightSleeve, 1.08);

            } else if (category === 'legs') {
                // CURVED SWEATPANTS & TROUSERS GEOMETRY
                const waistBand = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.10, 0.08, 32), materialInstance); 
                waistBand.position.y = 0.64;

                const leftPantLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.038, 0.32, 16, 16), materialInstance); 
                leftPantLeg.position.set(-0.05, 0.44, 0);

                const rightPantLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.038, 0.32, 16, 16), materialInstance); 
                rightPantLeg.position.set(0.05, 0.44, 0);

                applyOutlineStrokeMesh(waistBand, 1.06);
                applyOutlineStrokeMesh(leftPantLeg, 1.06);
                applyOutlineStrokeMesh(rightPantLeg, 1.06);
            }

            activeStageMeshes[category] = garmentGroupContainer;
            virtualMannequinGroup.add(garmentGroupContainer);
        }

        function renderVaultGridDisplay() {
            const gridContainer = document.getElementById('vaultGridDisplay');
            gridContainer.innerHTML = '';
            
            ['hat_photos', 'torso_photos', 'legs_photos'].forEach(photoLaneKey => {
                let shortCategoryName = photoLaneKey.split('_')[0];
                (photoVaultMap[photoLaneKey] || []).forEach(base64Data => {
                    createVaultCardElement(gridContainer, base64Data, shortCategoryName, null);
                });
            });
        }

        function createVaultCardElement(parentElement, imgData, categoryLabel, ownerBadgeText) {
            const vaultCardElement = document.createElement('div');
            vaultCardElement.className = 'vault-card';
            let badgeHTML = ownerBadgeText ? `<div class="owner-badge">${ownerBadgeText.toUpperCase()}</div>` : '';
            vaultCardElement.innerHTML = `${badgeHTML}<img src="${imgData}"><span>${categoryLabel}</span>`;
            parentElement.appendChild(vaultCardElement);
        }
    </script>
</body>
</html>
