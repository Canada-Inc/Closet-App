<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Virtual Lookbook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AVATAR STYLE STUDIO</h1>
        <p>Interactive Dress Up & Outfit Planner</p>
    </header>

    <div class="app-container">
        <!-- CONTROLS & UPLOAD SECTION -->
        <section class="control-panel">
            <h2>1. Intake Garment</h2>
            <div class="upload-wrapper">
                <input type="file" id="imageLoader" accept="image/*">
                <select id="categorySelect">
                    <option value="hats">Hats / Beanies</option>
                    <option value="tops">Tops / Coats</option>
                    <option value="bottoms">Pants / Skirts</option>
                    <option value="shoes">Footwear</option>
                </select>
                <button onclick="uploadItem()">Process & Fit</button>
            </div>

            <hr>

            <h2>2. Selector Deck</h2>
            <div class="deck-controls">
                <div class="control-row">
                    <span>Hats:</span>
                    <button onclick="cycle('hats', -1)">◀</button>
                    <button onclick="cycle('hats', 1)">▶</button>
                </div>
                <div class="control-row">
                    <span>Tops:</span>
                    <button onclick="cycle('tops', -1)">◀</button>
                    <button onclick="cycle('tops', 1)">▶</button>
                </div>
                <div class="control-row">
                    <span>Bottoms:</span>
                    <button onclick="cycle('bottoms', -1)">◀</button>
                    <button onclick="cycle('bottoms', 1)">▶</button>
                </div>
                <div class="control-row">
                    <span>Shoes:</span>
                    <button onclick="cycle('shoes', -1)">◀</button>
                    <button onclick="cycle('shoes', 1)">▶</button>
                </div>
            </div>
            <button class="action-btn save-btn" onclick="logOutfit()">Lock In Ensemble</button>
        </section>

        <!-- LIVE AVATAR VIEWPORT -->
        <section class="avatar-view">
            <h2>Live Avatar Fit</h2>
            <div class="avatar-frame">
                <!-- Simple vector fallback background mannequin -->
                <div class="mannequin-base"></div>
                <!-- Layer components mapped precisely by position -->
                <img id="layer-hats" class="clothing-layer hat-layer" src="" alt="">
                <img id="layer-tops" class="clothing-layer top-layer" src="" alt="">
                <img id="layer-bottoms" class="clothing-layer bottom-layer" src="" alt="">
                <img id="layer-shoes" class="clothing-layer shoe-layer" src="" alt="">
            </div>
            <div id="weatherEngine" class="weather-banner">
                Checking environmental parameters...
            </div>
        </section>

        <!-- ARCHIVE GRID -->
        <section class="inventory-archive">
            <h2>Closet Storage Vault</h2>
            <div class="vault-grid" id="vaultGrid"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
